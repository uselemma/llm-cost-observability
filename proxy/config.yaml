model_list:
  # Universal passthrough: any "<provider>/<model>" string the client sends
  # routes through Vercel AI Gateway with the same slug appended. Adding a
  # new provider (moonshotai, deepseek, mistral, ...) requires no config
  # change as long as Vercel supports it.
  - model_name: "*"
    litellm_params:
      model: "vercel_ai_gateway/*"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY

  # Per-model overrides for cost when the slug isn't in LiteLLM's pricing map
  # yet. Matches before the wildcard.
  - model_name: "google/gemini-embedding-2"
    litellm_params:
      model: "vercel_ai_gateway/google/gemini-embedding-2"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002 # $0.20 / 1M

litellm_settings:
  callbacks: clickhouse_logger.clickhouse_logger
  drop_params: true
  set_verbose: false

general_settings:
  custom_auth: auth.user_api_key_auth
