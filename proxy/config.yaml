model_list:
  # ----- Fireworks AI routes. Use `fireworks/<model-id>` from clients; LiteLLM
  # expands that to Fireworks' `accounts/fireworks/models/<model-id>` path.

  - model_name: "fireworks/kimi-k2p6"
    litellm_params:
      model: "fireworks_ai/accounts/fireworks/models/kimi-k2p6"
      api_key: os.environ/FIREWORKS_AI_API_KEY
      input_cost_per_token: 0.00000095 # $0.95 / 1M
      output_cost_per_token: 0.000004 # $4.00 / 1M
      cache_read_input_token_cost: 0.00000016 # $0.16 / 1M
      allowed_openai_params: ["thinking", "reasoning_effort"]

  - model_name: "fireworks/kimi-k2p5"
    litellm_params:
      model: "fireworks_ai/accounts/fireworks/models/kimi-k2p5"
      api_key: os.environ/FIREWORKS_AI_API_KEY
      input_cost_per_token: 0.0000006 # $0.60 / 1M
      output_cost_per_token: 0.000003 # $3.00 / 1M
      cache_read_input_token_cost: 0.0000001 # $0.10 / 1M
      allowed_openai_params: ["thinking", "reasoning_effort"]

  - model_name: "fireworks/*"
    litellm_params:
      model: "fireworks_ai/accounts/fireworks/models/*"
      api_key: os.environ/FIREWORKS_AI_API_KEY
      allowed_openai_params: ["thinking", "reasoning_effort"]

  - model_name: "*"
    litellm_params:
      model: "vercel_ai_gateway/*"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY

  # ----- Per-model pricing overrides for models too new to be in
  # LiteLLM's bundled model_prices.json. Rates pulled from each model's
  # Vercel AI Gateway page. Update if Vercel's pricing changes.

  - model_name: "google/gemini-embedding-2"
    litellm_params:
      model: "vercel_ai_gateway/google/gemini-embedding-2"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002 # $0.20 / 1M

  - model_name: "google/gemini-3-flash"
    litellm_params:
      model: "vercel_ai_gateway/google/gemini-3-flash"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000005 # $0.50 / 1M
      output_cost_per_token: 0.000003 # $3.00 / 1M
      cache_read_input_token_cost: 0.00000005 # $0.05 / 1M

  - model_name: "google/gemini-3.1-flash-lite-preview"
    litellm_params:
      model: "vercel_ai_gateway/google/gemini-3.1-flash-lite-preview"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.00000025 # $0.25 / 1M
      output_cost_per_token: 0.0000015 # $1.50 / 1M
      cache_read_input_token_cost: 0.000000025 # $0.025 / 1M

  - model_name: "xai/grok-4.1-fast-non-reasoning"
    litellm_params:
      model: "vercel_ai_gateway/xai/grok-4.1-fast-non-reasoning"
