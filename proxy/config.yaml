      input_cost_per_token: 0.0000002 # $0.20 / 1M
      output_cost_per_token: 0.0000005 # $0.50 / 1M
      cache_read_input_token_cost: 0.00000005 # $0.05 / 1M

  - model_name: "xai/grok-4.1-fast-reasoning"
    litellm_params:
      model: "vercel_ai_gateway/xai/grok-4.1-fast-reasoning"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002 # $0.20 / 1M
      output_cost_per_token: 0.0000005 # $0.50 / 1M
      cache_read_input_token_cost: 0.00000005 # $0.05 / 1M

  - model_name: "xai/grok-4.3"
    litellm_params:
      model: "vercel_ai_gateway/xai/grok-4.3"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.00000125 # $1.25 / 1M
      output_cost_per_token: 0.0000025 # $2.50 / 1M
      cache_read_input_token_cost: 0.0000002 # $0.20 / 1M

  - model_name: "minimax/minimax-m2.7"
