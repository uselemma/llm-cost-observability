model_list:
  - model_name: "*"
    litellm_params:
      model: "vercel_ai_gateway/*"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY

  # ----- Per-model pricing overrides for models too new to be in
  # LiteLLM's bundled model_prices.json. Rates pulled from each model's
  # Vercel AI Gateway page. Update if Vercel's pricing changes.

  - model_name: "google/gemini-embedding-2"
    litellm_params:
      model: "vercel_ai_gateway/google/gemini-embedding-2"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002       # $0.20 / 1M

  - model_name: "xai/grok-4.1-fast-non-reasoning"
    litellm_params:
      model: "vercel_ai_gateway/xai/grok-4.1-fast-non-reasoning"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002       # $0.20 / 1M
      output_cost_per_token: 0.0000005      # $0.50 / 1M
      cache_read_input_token_cost: 0.00000005  # $0.05 / 1M

  - model_name: "xai/grok-4.1-fast-reasoning"
    litellm_params:
      model: "vercel_ai_gateway/xai/grok-4.1-fast-reasoning"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000002       # $0.20 / 1M
      output_cost_per_token: 0.0000005      # $0.50 / 1M
      cache_read_input_token_cost: 0.00000005  # $0.05 / 1M

  - model_name: "openai/gpt-5.4"
    litellm_params:
      model: "vercel_ai_gateway/openai/gpt-5.4"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.0000025       # $2.50 / 1M
      output_cost_per_token: 0.000015       # $15.00 / 1M
      cache_read_input_token_cost: 0.00000025  # $0.25 / 1M

  - model_name: "openai/gpt-5.4-mini"
    litellm_params:
      model: "vercel_ai_gateway/openai/gpt-5.4-mini"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.00000075      # $0.75 / 1M
      output_cost_per_token: 0.0000045      # $4.50 / 1M
      cache_read_input_token_cost: 0.00000007  # $0.07 / 1M

  - model_name: "moonshotai/kimi-k2.6"
    litellm_params:
      model: "vercel_ai_gateway/moonshotai/kimi-k2.6"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.00000095      # $0.95 / 1M
      output_cost_per_token: 0.000004       # $4.00 / 1M
      cache_read_input_token_cost: 0.00000016  # $0.16 / 1M

  - model_name: "anthropic/claude-sonnet-4.6"
    litellm_params:
      model: "vercel_ai_gateway/anthropic/claude-sonnet-4.6"
      api_key: os.environ/VERCEL_AI_GATEWAY_API_KEY
      input_cost_per_token: 0.000003        # $3.00 / 1M
      output_cost_per_token: 0.000015       # $15.00 / 1M
      cache_read_input_token_cost: 0.0000003   # $0.30 / 1M
      cache_creation_input_token_cost: 0.00000375  # $3.75 / 1M

litellm_settings:
  callbacks: proxy.clickhouse_logger.clickhouse_logger
  # drop_params: true would silently strip provider-specific params like
  # `thinking` (Anthropic) and `reasoning_effort` (o-series), which kills
  # reasoning streaming. Keep false so those pass through.
  drop_params: false
  set_verbose: false

general_settings:
  custom_auth: proxy.auth.user_api_key_auth
