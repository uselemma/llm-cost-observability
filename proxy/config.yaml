      cache_read_input_token_cost: 0.0000003 # $0.30 / 1M
      cache_creation_input_token_cost: 0.00000375 # $3.75 / 1M

litellm_settings:
  callbacks: clickhouse_logger.clickhouse_logger
  # drop_params: true would silently strip provider-specific params like
  # `thinking` (Anthropic) and `reasoning_effort` (o-series), which kills
  # reasoning streaming. Keep false so those pass through.
  drop_params: false
  set_verbose: false

general_settings:
  custom_auth: auth.user_api_key_auth
